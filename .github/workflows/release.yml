name: Release

# Baut die Installer für alle Plattformen und hängt sie an einen GitHub-Release-Entwurf.
# Auslöser: Git-Tag `vX.Y.Z`.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rust einrichten
        run: rustup toolchain install stable --profile minimal

      - name: Linux-Abhängigkeiten (Tauri v2 + Tray)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf file

      - name: npm-Abhängigkeiten
        working-directory: app
        run: npm ci

      - name: Bauen & Release-Entwurf erstellen
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: "Avox ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
