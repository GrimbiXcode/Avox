name: App (GUI)

# Baut die Tauri-GUI und die Installer-Bundles auf allen drei Plattformen.
# Verifiziert die Baubarkeit; signiert wird hier (noch) nicht.

on:
  push:
    branches: [main]
    paths: ["app/**", "crates/**", ".github/workflows/app.yml"]
  pull_request:
    paths: ["app/**", "crates/**", ".github/workflows/app.yml"]

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rust einrichten
        run: rustup toolchain install stable --profile minimal

      - name: Linux-Abhängigkeiten (Tauri v2 + Tray)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf file

      - name: npm-Abhängigkeiten (Tauri-CLI)
        working-directory: app
        run: npm ci

      - name: Bundles bauen
        working-directory: app
        run: npx tauri build

      - name: Artefakte hochladen
        uses: actions/upload-artifact@v4
        with:
          name: avox-${{ matrix.os }}
          if-no-files-found: ignore
          path: |
            app/src-tauri/target/release/bundle/**/*.dmg
            app/src-tauri/target/release/bundle/**/*.app
            app/src-tauri/target/release/bundle/**/*.deb
            app/src-tauri/target/release/bundle/**/*.rpm
            app/src-tauri/target/release/bundle/**/*.AppImage
            app/src-tauri/target/release/bundle/**/*.msi
            app/src-tauri/target/release/bundle/**/*setup.exe
