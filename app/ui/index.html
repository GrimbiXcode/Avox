<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avox Antivirus</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <svg class="logo" viewBox="0 0 48 48" aria-hidden="true">
          <rect x="1" y="1" width="46" height="46" rx="11" fill="#0B1F3A" />
          <path d="M24 9 L37 14 L37 25 Q37 34 24 40 Q11 34 11 25 L11 14 Z" fill="#2FB6A8" />
          <path d="M17 24 l5 5 l9 -11" fill="none" stroke="#fff" stroke-width="3.4"
                stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span class="brand-name">Avox</span>
      </div>
      <div id="status-pill" class="pill pill-unknown">Status wird geprüft…</div>
    </header>

    <main>
      <!-- Schutzstatus -->
      <section class="cards">
        <div class="card">
          <div class="card-label">Dienststatus</div>
          <div id="service-state" class="card-value">–</div>
          <div id="service-sub" class="card-sub">clamd-Verbindung</div>
        </div>
        <div class="card">
          <div class="card-label">clamd-Version</div>
          <div id="clamd-version" class="card-value small">–</div>
          <div class="card-sub">ClamAV-Engine</div>
        </div>
        <div class="card">
          <div class="card-label">Signaturen</div>
          <div id="sig-state" class="card-value small">–</div>
          <button id="btn-update" class="btn btn-ghost">Aktualisieren</button>
        </div>
      </section>

      <!-- Scan -->
      <section class="panel">
        <div class="panel-head">
          <h2>Scan</h2>
          <button id="btn-fullscan" class="btn btn-ghost">Vollständiger Scan</button>
        </div>
        <div class="scan-row">
          <input id="scan-path" type="text" placeholder="Pfad zu Datei oder Ordner (z. B. /Users/…/Downloads)" />
          <button id="btn-scan" class="btn btn-primary">Scannen</button>
        </div>
        <div id="scan-result" class="result" hidden></div>
      </section>

      <!-- Geplante Scans -->
      <section class="panel">
        <div class="panel-head">
          <h2>Geplante Scans</h2>
          <button id="btn-refresh-s" class="btn btn-ghost">Neu laden</button>
        </div>
        <div id="schedule-list" class="qlist">
          <p class="muted">–</p>
        </div>
      </section>

      <!-- Quarantäne -->
      <section class="panel">
        <div class="panel-head">
          <h2>Quarantäne</h2>
          <button id="btn-refresh-q" class="btn btn-ghost">Neu laden</button>
        </div>
        <div id="quarantine-list" class="qlist">
          <p class="muted">–</p>
        </div>
      </section>

      <!-- Aktivität -->
      <section class="panel">
        <h2>Aktivität</h2>
        <ul id="log" class="log"></ul>
      </section>
    </main>

    <footer class="footer">
      Avox · Open-Source-Antivirus auf ClamAV-Basis · unprivilegierte GUI
    </footer>

    <script src="main.js"></script>
  </body>
</html>
